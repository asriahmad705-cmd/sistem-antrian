<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin - Grand Nusantara</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--emas:#C9A84C;--hitam:#1A1A2E;--abu:#F7F5F0;--putih:#FFFFFF;--teks:#2C2C2C}
  body{font-family:'Inter',sans-serif;background:var(--abu);color:var(--teks)}
  header{background:var(--hitam);color:var(--putih);padding:18px 40px;display:flex;justify-content:space-between;align-items:center}
  .logo{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--emas)}
  nav a{color:#ccc;text-decoration:none;margin-left:20px;font-size:0.9rem}
  nav a:hover{color:var(--emas)}
  .container{max-width:1200px;margin:30px auto;padding:0 20px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat-card{background:var(--putih);border-radius:10px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
  .stat-card .label{font-size:0.75rem;color:#888;text-transform:uppercase;letter-spacing:1px}
  .stat-card .nilai{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--hitam);margin-top:6px}
  .stat-card .nilai.emas{color:var(--emas)}
  .card{background:var(--putih);border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:20px}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .card-header h2{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--hitam)}
  .filter-bar{display:flex;gap:10px;flex-wrap:wrap}
  .filter-bar input,.filter-bar select{padding:8px 12px;border:1.5px solid #E0DDD8;border-radius:6px;font-size:0.85rem;font-family:'Inter',sans-serif}
  table{width:100%;border-collapse:collapse;font-size:0.85rem}
  th{background:var(--hitam);color:var(--putih);padding:12px 10px;text-align:left;font-weight:500;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.5px}
  td{padding:12px 10px;border-bottom:1px solid #F0EDE8}
  tr:hover td{background:#FFF9ED}
  .badge{padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:600}
  .badge.lunas{background:#E8F5E9;color:#2E7D32}
  .badge.dp{background:#FFF3E0;color:#E65100}
  .badge.belum{background:#FFEBEE;color:#C62828}
  .badge.standard{background:#E3F2FD;color:#1565C0}
  .badge.deluxe{background:#F3E5F5;color:#6A1B9A}
  .badge.suite{background:#FFF8E1;color:#F57F17}
  .badge.villa{background:#E8F5E9;color:#1B5E20}
  .btn-sm{padding:5px 12px;border-radius:5px;border:none;cursor:pointer;font-size:0.8rem;font-weight:600}
  .btn-lunas{background:#E8F5E9;color:#2E7D32}
  .btn-hapus{background:#FFEBEE;color:#C62828}
  .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center}
  .modal.aktif{display:flex}
  .modal-box{background:var(--putih);border-radius:12px;padding:32px;width:90%;max-width:500px}
  .modal-box h3{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:20px;color:var(--hitam)}
  .form-group{margin-bottom:14px}
  .form-group label{display:block;font-size:0.8rem;font-weight:600;color:#555;margin-bottom:6px;text-transform:uppercase}
  .form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid #E0DDD8;border-radius:7px;font-family:'Inter',sans-serif;font-size:0.9rem}
  .modal-actions{display:flex;gap:10px;margin-top:16px}
  .btn-primary{flex:1;padding:12px;background:linear-gradient(135deg,var(--emas),#A8843C);color:#fff;border:none;border-radius:7px;font-weight:600;cursor:pointer}
  .btn-cancel{flex:1;padding:12px;background:#F0EDE8;color:#555;border:none;border-radius:7px;font-weight:600;cursor:pointer}
  .empty{text-align:center;padding:40px;color:#aaa;font-size:0.9rem}
  @media(max-width:768px){.stats{grid-template-columns:1fr 1fr}table{font-size:0.78rem}}
</style>
</head>
<body>
<header>
  <div class="logo">Grand Nusantara — Admin</div>
  <nav>
    <a href="/">Form Reservasi</a>
    <a href="/admin">Data Tamu</a>
    <a href="/laporan">Laporan</a>
  </nav>
</header>

<div class="container">
  <div class="stats">
    <div class="stat-card">
      <div class="label">Total Reservasi</div>
      <div class="nilai" id="statTotal">-</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Pendapatan</div>
      <div class="nilai emas" id="statPendapatan">-</div>
    </div>
    <div class="stat-card">
      <div class="label">Sudah Lunas</div>
      <div class="nilai" id="statLunas">-</div>
    </div>
    <div class="stat-card">
      <div class="label">Belum Bayar</div>
      <div class="nilai" id="statBelum">-</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Data Reservasi</h2>
      <div class="filter-bar">
        <input type="text" id="cari" placeholder="Cari nama..." onkeyup="filterData()"/>
        <select id="filterKamar" onchange="filterData()">
          <option value="">Semua Kamar</option>
          <option value="standard">Standard</option>
          <option value="deluxe">Deluxe</option>
          <option value="suite">Suite</option>
          <option value="villa">Villa</option>
        </select>
        <select id="filterStatus" onchange="filterData()">
          <option value="">Semua Status</option>
          <option value="lunas">Lunas</option>
          <option value="dp">DP</option>
          <option value="belum_bayar">Belum Bayar</option>
        </select>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nama</th>
            <th>NIK</th>
            <th>No HP</th>
            <th>Kamar</th>
            <th>Check-in</th>
            <th>Check-out</th>
            <th>Malam</th>
            <th>Total</th>
            <th>Metode</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelData">
          <tr><td colspan="12" class="empty">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Edit -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Update Status Reservasi</h3>
    <input type="hidden" id="editId"/>
    <div class="form-group">
      <label>Status Pembayaran</label>
      <select id="editStatus">
        <option value="belum_bayar">Belum Bayar</option>
        <option value="dp">DP</option>
        <option value="lunas">Lunas</option>
      </select>
    </div>
    <div class="form-group">
      <label>Catatan</label>
      <textarea id="editCatatan" rows="3"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="tutupModal()">Batal</button>
      <button class="btn-primary" onclick="simpanEdit()">Simpan</button>
    </div>
  </div>
</div>

<script>
let semuaData = [];

async function muatData() {
  const res = await fetch("/api/reservasi");
  semuaData = await res.json();
  hitungStats();
  renderTabel(semuaData);
}

function hitungStats() {
  const total = semuaData.length;
  const pendapatan = semuaData.reduce((s,r) => s + parseFloat(r.total_harga||0), 0);
  const lunas = semuaData.filter(r => r.status_pembayaran === "lunas").length;
  const belum = semuaData.filter(r => r.status_pembayaran === "belum_bayar").length;
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statPendapatan").textContent = "Rp " + pendapatan.toLocaleString("id");
  document.getElementById("statLunas").textContent = lunas;
  document.getElementById("statBelum").textContent = belum;
}

function renderTabel(data) {
  const tbody = document.getElementById("tabelData");
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="12" class="empty">Tidak ada data</td></tr>'; return; }
  tbody.innerHTML = data.map((r,i) => `
    <tr>
      <td>${i+1}</td>
      <td><strong>${r.nama}</strong></td>
      <td>${r.nik}</td>
      <td>${r.no_hp}</td>
      <td><span class="badge ${r.tipe_kamar}">${r.tipe_kamar}</span></td>
      <td>${r.checkin}</td>
      <td>${r.checkout}</td>
      <td>${r.lama_menginap}x</td>
      <td><strong>Rp ${parseFloat(r.total_harga).toLocaleString("id")}</strong></td>
      <td>${r.metode_pembayaran}</td>
      <td><span class="badge ${r.status_pembayaran === 'lunas' ? 'lunas' : r.status_pembayaran === 'dp' ? 'dp' : 'belum'}">${r.status_pembayaran}</span></td>
      <td style="display:flex;gap:6px">
        <button class="btn-sm btn-lunas" onclick="bukaModal(${r.id},'${r.status_pembayaran}','${r.catatan||''}')">Edit</button>
        <button class="btn-sm btn-hapus" onclick="hapus(${r.id})">Hapus</button>
      </td>
    </tr>
  `).join("");
}

function filterData() {
  const cari = document.getElementById("cari").value.toLowerCase();
  const kamar = document.getElementById("filterKamar").value;
  const status = document.getElementById("filterStatus").value;
  const hasil = semuaData.filter(r =>
    (!cari || r.nama.toLowerCase().includes(cari)) &&
    (!kamar || r.tipe_kamar === kamar) &&
    (!status || r.status_pembayaran === status)
  );
  renderTabel(hasil);
}

function bukaModal(id, status, catatan) {
  document.getElementById("editId").value = id;
  document.getElementById("editStatus").value = status;
  document.getElementById("editCatatan").value = catatan;
  document.getElementById("modal").classList.add("aktif");
}

function tutupModal() {
  document.getElementById("modal").classList.remove("aktif");
}

async function simpanEdit() {
  const id = document.getElementById("editId").value;
  await fetch(`/api/reservasi/${id}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      status_pembayaran: document.getElementById("editStatus").value,
      catatan: document.getElementById("editCatatan").value
    })
  });
  tutupModal();
  muatData();
}

async function hapus(id) {
  if (!confirm("Yakin hapus reservasi ini?")) return;
  await fetch(`/api/reservasi/${id}`, {method: "DELETE"});
  muatData();
}

muatData();
</script>
</body>
</html>
